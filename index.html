<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quote Generator</title>
    <link rel="stylesheet" href="<link rel=" stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
        integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./index.css">
</head>

<body>
    <div class="quote-container" id="quote-container">
        <!-- quote -->
        <div class="quote-text">
            <i class="fas fa-quote-left"></i>
            <span id="quote">Wht are you is whay you have been .Whay you will be what you do now.</span>
        </div>
        <!-- author -->
        <div class="quote-author">
            <span id="author">Buddha</span>
        </div>
        <!-- buttons -->
        <div class="button-container">
            <button class="twitter-button" id="twitter" title="Tweet This"><i class="fab fa-twitter"></i></button>
            <button id="new-quote">New quote</button>
        </div>
    </div>
    <!-- script -->
    <script src="https://kit.fontawesome.com/7119a5271f.js" crossorigin="anonymous"></script>
    <script src="./script.js"></script>
</body>

</html>
